name: Release

on:
    push:
        branches: [main]

jobs:
    release-please:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
            html_url: ${{ steps.release.outputs.html_url }}
            body: ${{ steps.release.outputs.body }}
        steps:
            - uses: googleapis/release-please-action@v4
              id: release
              with:
                  token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
                  release-type: python
                  config-file: .release-please-config.json

    notify-slack:
        needs: release-please
        if: ${{ needs.release-please.outputs.release_created }}
        runs-on: ubuntu-latest
        steps:
            - name: Convert release notes to Slack mrkdwn
              id: transform
              env:
                  RELEASE_BODY: ${{ needs.release-please.outputs.body }}
              run: |
                  python3 <<'PY'
                  import os, re, secrets

                  def convert(text):
                      out = []
                      for line in text.split("\n"):
                          line = re.sub(r"\[([^\]]+)\]\(([^)]+)\)", r"<\2|\1>", line)
                          heading = re.match(r"^#{1,6}\s+(.*)$", line)
                          if heading:
                              line = f"*{heading.group(1)}*"
                          else:
                              line = re.sub(r"^(\s*)[*-]\s+", r"\1• ", line)
                          out.append(line)
                      return "\n".join(out)

                  text = convert(os.environ["RELEASE_BODY"])
                  if len(text) > 2900:
                      text = text[:2900].rstrip() + "\n… _(truncated — see full release below)_"

                  delim = f"SLACK_EOF_{secrets.token_hex(16)}"
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write(f"text<<{delim}\n")
                      f.write(text)
                      f.write(f"\n{delim}\n")
                  PY

            - uses: slackapi/slack-github-action@v2
              with:
                  webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
                  webhook-type: incoming-webhook
                  payload: |
                      blocks:
                        - type: header
                          text:
                            type: plain_text
                            text: ":rocket: inspect-flow ${{ needs.release-please.outputs.tag_name }} released"
                        - type: section
                          text:
                            type: mrkdwn
                            text: ${{ toJSON(steps.transform.outputs.text) }}
                        - type: section
                          text:
                            type: mrkdwn
                            text: "<${{ needs.release-please.outputs.html_url }}|View the full release>"

    publish:
        needs: release-please
        if: ${{ needs.release-please.outputs.release_created }}
        runs-on: ubuntu-latest
        permissions:
            id-token: write # Required for OIDC/trusted publishing
        environment:
            name: pypi
            url: https://pypi.org/p/inspect-flow

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # Get all tags for version detection

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Show current version
              run: |
                  echo "Version: $(git describe --tags --always)"

            - name: Build
              run: |
                  pip install --upgrade pip build
                  python -m build
                  ls -la dist/

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
