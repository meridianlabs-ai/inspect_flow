name: Release

on:
    push:
        branches: [main]
    workflow_dispatch:
        inputs:
            target-branch:
                description: "Maintenance branch to release from (e.g. hotfix/1.4.x). Leave as main for a normal release."
                type: string
                default: main

jobs:
    release-please:
        permissions:
            contents: write
            pull-requests: write
        uses: meridianlabs-ai/actions/.github/workflows/release-please-python.yml@v1
        with:
            approvers: "ransomr jjallaire dragonstyle"
            target-branch: ${{ inputs.target-branch }}
        secrets: inherit

    # Release announcement to flow's Slack channel (shared converter action).
    announce:
        needs: release-please
        if: ${{ needs.release-please.outputs.release_created }}
        runs-on: ubuntu-latest
        steps:
            - uses: meridianlabs-ai/actions/slack-release-announce@v1
              with:
                  webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
                  title: ":rocket: inspect-flow ${{ needs.release-please.outputs.tag_name }} released"
                  release-url: ${{ needs.release-please.outputs.html_url }}
                  release-body: ${{ needs.release-please.outputs.body }}

    # Publish stays in-repo (PyPI trusted publishing can't run from a cross-repo
    # reusable workflow; keeping it here leaves the trusted-publisher config for
    # workflow release.yaml unchanged).
    publish:
        needs: release-please
        if: ${{ needs.release-please.outputs.release_created }}
        runs-on: ubuntu-latest
        permissions:
            id-token: write # Required for OIDC/trusted publishing
        environment:
            name: pypi
            url: https://pypi.org/p/inspect-flow

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0 # Get all tags for version detection

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Show current version
              run: |
                  echo "Version: $(git describe --tags --always)"

            - name: Build
              run: |
                  pip install --upgrade pip build
                  python -m build
                  ls -la dist/

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
